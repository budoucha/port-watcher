<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>日本の港湾ライブカメラ ダッシュボード</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  html,body{margin:0;height:100%;font-family:-apple-system,"Segoe UI",sans-serif;background:#f6f7f9;color:#222}
  #app{display:flex;height:100vh}
  #sidebar{width:320px;flex:none;border-right:1px solid #e2e4e8;background:#fff;display:flex;flex-direction:column}
  #sidebar header{padding:14px 16px;border-bottom:1px solid #eee}
  #sidebar h1{font-size:15px;margin:0 0 4px}
  #sidebar p{font-size:12px;color:#666;margin:0}
  #search{padding:10px 12px;border-bottom:1px solid #eee}
  #search input{width:100%;box-sizing:border-box;padding:7px 10px;border:1px solid #d0d4da;border-radius:6px;font-size:13px}
  #count{padding:6px 14px;font-size:12px;color:#666;border-bottom:1px solid #f0f0f0}
  #list{overflow:auto;flex:1}
  .item{padding:8px 14px;border-bottom:1px solid #f3f3f3;cursor:pointer;font-size:13px}
  .item:hover{background:#f4f7fb}
  .item.active{background:#e8f0fb}
  .item .name{font-weight:600}
  .item .meta{font-size:11px;color:#888;margin-top:2px}
  .item .badge{display:inline-block;font-size:10px;padding:1px 5px;border-radius:3px;margin-left:4px;vertical-align:middle;font-weight:normal}
  .badge-yt{background:#ff0000;color:#fff}
  .badge-mics{background:#1f6feb;color:#fff}
  #map{flex:1;background:#eaf1f8}
  .leaflet-container{background:#eaf1f8}
  .leaflet-popup-content{margin:10px 12px;font-size:13px;min-width:260px}
  .leaflet-popup-content-wrapper{max-width:520px}
  .popup-title{font-weight:600;margin-bottom:3px;font-size:14px}
  .popup-meta{color:#666;font-size:11px;margin-bottom:8px}
  .popup-thumb{display:block;width:100%;height:auto;border-radius:4px;background:#000;margin-bottom:8px}
  .popup-yt{display:block;width:100%;aspect-ratio:16/9;border:0;border-radius:4px;margin-bottom:8px;background:#000}
  .popup-actions a{display:inline-block;padding:5px 10px;background:#1f6feb;color:#fff;border-radius:4px;text-decoration:none;font-size:12px;margin-right:6px}
  .popup-actions a.yt-link{background:#ff0000}
  .cam-marker{width:14px;height:14px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.3);cursor:pointer}
  .cam-marker.mics{background:#e0432f}
  .cam-marker.yt{background:#1ea44c}
  .cam-marker.dim{background:#bbb !important}
  .port-marker{width:12px;height:12px;background:#888;border:2px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.3);cursor:pointer}
  .port-marker.dim{background:#ccc !important}
  #legend{padding:8px 14px;border-top:1px solid #eee;font-size:11px;color:#666;display:flex;gap:12px;flex-wrap:wrap}
  .leg{display:flex;align-items:center;gap:4px}
  .leg-dot{width:10px;height:10px;border-radius:50%;border:1.5px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.25)}
  .leg-sq{width:10px;height:10px;background:#888;border:1.5px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.25)}
  .badge-port{background:#666;color:#fff}
  .popup-berth-table{width:100%;border-collapse:collapse;font-size:11px;margin-top:6px}
  .popup-berth-table th{background:#f0f0f0;padding:3px 5px;text-align:left;font-weight:600;white-space:nowrap}
  .popup-berth-table td{padding:3px 5px;border-bottom:1px solid #f0f0f0;white-space:nowrap}
  .popup-berth-table tr:last-child td{border-bottom:none}
  .popup-port-wrap{max-height:280px;overflow-y:auto}
  .popup-port-rate{display:inline-block;font-size:10px;padding:1px 5px;border-radius:3px;background:#555;color:#fff;margin-left:5px;vertical-align:middle}
</style>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <header>
      <h1>日本の港湾ライブカメラ</h1>
      <p>海上保安庁 MICS / 東京都離島港湾 / 各局</p>
    </header>
    <div id="search"><input id="q" placeholder="名前・出典・管区で検索…" autocomplete="off"></div>
    <div id="count"></div>
    <div id="list"></div>
    <div id="legend">
      <div class="leg"><div class="leg-dot" style="background:#e0432f"></div>海保 MICS</div>
      <div class="leg"><div class="leg-dot" style="background:#1ea44c"></div>YouTube ライブ</div>
      <div class="leg"><div class="leg-sq"></div>港湾インフラ (MLIT)</div>
    </div>
  </aside>
  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/topojson-client@3"></script>
<script src="data.js"></script>
<script src="extra-cameras.js"></script>
<script src="berths.js"></script>
<script>
(function(){
  const micsCams = window.CAMERAS.map(c => ({...c, _type:'mics'}));
  const ytCams   = (window.EXTRA_CAMERAS||[]).map(c => ({...c, _type:'yt'}));
  const allCams  = [...micsCams, ...ytCams];
  const allPorts = (window.PORT_BERTHS||[]);

  const topo = window.JAPAN_TOPO;

  const map = L.map('map', {
    center: [36.5, 137.5],
    zoom: 6,
    minZoom: 4,
    maxZoom: 12,
    zoomControl: true,
    attributionControl: false
  });

  // 白地図
  const objKey = Object.keys(topo.objects)[0];
  const gj = topojson.feature(topo, topo.objects[objKey]);
  L.geoJSON(gj, {
    style: () => ({color:'#7d8590', weight:0.6, fillColor:'#fbfbf7', fillOpacity:1})
  }).addTo(map);

  // MICS ポップアップ
  const micsThumbURL = c => `https://camera.mics.kaiho.mlit.go.jp/camportalAPI/camera/getthumbnail?id=${c.id}&timestamp=${Date.now()}`;
  const micsPageURL  = c => `https://camera.mics.kaiho.mlit.go.jp/camstream/${c.base_name}/`;

  function micsPopup(c){
    return `<div class="popup-title">${c.jp_name}</div>
      <div class="popup-meta">${c.kanku} / ${c.hoanbu}</div>
      <img class="popup-thumb" src="${micsThumbURL(c)}" alt="" onerror="this.style.display='none'">
      <div class="popup-actions">
        <a href="${micsPageURL(c)}" target="_blank" rel="noopener">ライブカメラを開く</a>
      </div>`;
  }

  // YouTube ポップアップ（クリック時にのみ iframe を挿入）
  function ytPopup(c){
    const embedSrc = `https://www.youtube.com/embed/${c.videoId}?autoplay=1&mute=1`;
    const watchURL = `https://www.youtube.com/watch?v=${c.videoId}`;
    return `<div class="popup-title">${c.jp_name}</div>
      <div class="popup-meta">${c.source}</div>
      <iframe class="popup-yt" src="${embedSrc}" allow="autoplay; encrypted-media" allowfullscreen></iframe>
      <div class="popup-actions">
        <a class="yt-link" href="${watchURL}" target="_blank" rel="noopener">YouTube で開く</a>
      </div>`;
  }

  // 港湾インフラ ポップアップ
  function portPopup(p){
    const rateHtml = p.rate ? `<span class="popup-port-rate">${p.rate}</span>` : '';
    const rows = p.berths.map(b => {
      const depth = b.depth != null ? b.depth + 'm' : '-';
      const dwt   = b.dwt  != null ? b.dwt.toLocaleString() + 't' : '-';
      const grade = b.grade || '-';
      const cargo = b.cargo || '-';
      return `<tr><td>${b.name||'-'}</td><td>${b.type||'-'}</td><td>${depth}</td><td>${cargo}</td><td>${dwt}</td><td>${grade}</td></tr>`;
    }).join('');
    return `<div class="popup-title">${p.name}${rateHtml}</div>
      <div class="popup-meta">岸壁数 ${p.berths.length} — MLIT 港湾カルテ</div>
      <div class="popup-port-wrap">
        <table class="popup-berth-table">
          <thead><tr><th>岸壁名</th><th>種別</th><th>水深</th><th>主要貨物</th><th>DWT</th><th>評価</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }

  const markers = new Map();
  const portMarkers = new Map();

  allCams.forEach(c => {
    const isYt = c._type === 'yt';
    const icon = L.divIcon({
      className: '',
      html: `<div class="cam-marker ${c._type}" title="${c.jp_name}"></div>`,
      iconSize: [14,14], iconAnchor: [7,7]
    });
    const m = L.marker([c.latitude, c.longitude], {icon}).addTo(map);
    m.bindPopup(() => isYt ? ytPopup(c) : micsPopup(c), {maxWidth:320});
    m.on('click', () => highlight(c.id));
    markers.set(c.id, m);
  });

  allPorts.forEach(p => {
    const icon = L.divIcon({
      className: '',
      html: `<div class="port-marker" title="${p.name}"></div>`,
      iconSize: [12,12], iconAnchor: [6,6]
    });
    const m = L.marker([p.lat, p.lon], {icon}).addTo(map);
    m.bindPopup(() => portPopup(p), {maxWidth:500});
    m.on('click', () => highlightPort(p.id));
    portMarkers.set(p.id, m);
  });

  // サイドバー
  const listEl  = document.getElementById('list');
  const countEl = document.getElementById('count');
  const qEl     = document.getElementById('q');

  function render(filter){
    const f = (filter||'').trim().toLowerCase();
    listEl.innerHTML = '';
    let n = 0;

    allCams.forEach(c => {
      const hay = (c.jp_name + ' ' +
        (c._type === 'mics' ? c.kanku + ' ' + c.hoanbu : c.source)
      ).toLowerCase();
      const match = !f || hay.includes(f);
      const mk = markers.get(c.id);
      const el = mk && mk.getElement();
      const dot = el && el.querySelector('.cam-marker');
      if (dot) dot.classList.toggle('dim', !match);
      if (!match) return;
      n++;
      const div = document.createElement('div');
      div.className = 'item';
      div.dataset.id = String(c.id);
      div.dataset.kind = 'cam';
      const badge = c._type === 'yt'
        ? '<span class="badge badge-yt">YT</span>'
        : '<span class="badge badge-mics">MICS</span>';
      const meta = c._type === 'mics'
        ? `${c.kanku} · ${c.hoanbu}`
        : c.source;
      div.innerHTML = `<div class="name">${c.jp_name}${badge}</div><div class="meta">${meta}</div>`;
      div.addEventListener('click', () => {
        map.setView([c.latitude, c.longitude], Math.max(map.getZoom(), 8), {animate:true});
        mk.openPopup();
        highlight(c.id);
      });
      listEl.appendChild(div);
    });

    allPorts.forEach(p => {
      const hay = (p.name + ' ' + p.rate + ' ' + p.berths.map(b=>b.cargo).join(' ')).toLowerCase();
      const match = !f || hay.includes(f);
      const mk = portMarkers.get(p.id);
      const el = mk && mk.getElement();
      const sq = el && el.querySelector('.port-marker');
      if (sq) sq.classList.toggle('dim', !match);
      if (!match) return;
      n++;
      const div = document.createElement('div');
      div.className = 'item';
      div.dataset.id = p.id;
      div.dataset.kind = 'port';
      div.innerHTML = `<div class="name">${p.name}<span class="badge badge-port">港湾</span></div><div class="meta">${p.rate} · 岸壁 ${p.berths.length}基</div>`;
      div.addEventListener('click', () => {
        map.setView([p.lat, p.lon], Math.max(map.getZoom(), 9), {animate:true});
        mk.openPopup();
        highlightPort(p.id);
      });
      listEl.appendChild(div);
    });

    const total = allCams.length + allPorts.length;
    countEl.textContent = `${n} / ${total} 件`;
  }

  function highlight(id){
    const sid = String(id);
    document.querySelectorAll('.item').forEach(el =>
      el.classList.toggle('active', el.dataset.id === sid && el.dataset.kind === 'cam'));
  }

  function highlightPort(id){
    document.querySelectorAll('.item').forEach(el =>
      el.classList.toggle('active', el.dataset.id === id && el.dataset.kind === 'port'));
  }

  qEl.addEventListener('input', e => render(e.target.value));
  render('');
})();
</script>
</body>
</html>
