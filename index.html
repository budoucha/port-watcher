<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>日本の港湾ライブカメラ ダッシュボード</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  html,body{margin:0;height:100%;font-family:-apple-system,"Segoe UI",sans-serif;background:#f6f7f9;color:#222}
  #app{display:flex;height:100vh}
  #sidebar{width:320px;flex:none;border-right:1px solid #e2e4e8;background:#fff;display:flex;flex-direction:column}
  #sidebar header{padding:14px 16px;border-bottom:1px solid #eee}
  #sidebar h1{font-size:15px;margin:0 0 4px}
  #sidebar p{font-size:12px;color:#666;margin:0}
  #search{padding:10px 12px;border-bottom:1px solid #eee}
  #search input{width:100%;box-sizing:border-box;padding:7px 10px;border:1px solid #d0d4da;border-radius:6px;font-size:13px}
  #count{padding:6px 14px;font-size:12px;color:#666;border-bottom:1px solid #f0f0f0}
  #list{overflow:auto;flex:1}
  .item{padding:8px 14px;border-bottom:1px solid #f3f3f3;cursor:pointer;font-size:13px}
  .item:hover{background:#f4f7fb}
  .item.active{background:#e8f0fb}
  .item .name{font-weight:600}
  .item .meta{font-size:11px;color:#888;margin-top:2px}
  #map{flex:1;background:#eaf1f8}
  .leaflet-container{background:#eaf1f8}
  .japan{fill:#fbfbf7;stroke:#7d8590;stroke-width:0.6}
  .leaflet-popup-content{margin:10px 12px;font-size:13px;min-width:240px}
  .popup-title{font-weight:600;margin-bottom:4px;font-size:14px}
  .popup-meta{color:#666;font-size:11px;margin-bottom:8px}
  .popup-thumb{display:block;width:100%;height:auto;border-radius:4px;background:#000;margin-bottom:8px}
  .popup-actions a{display:inline-block;padding:5px 10px;background:#1f6feb;color:#fff;border-radius:4px;text-decoration:none;font-size:12px;margin-right:6px}
  .popup-actions a.alt{background:#e8eaed;color:#222}
  .cam-marker{width:14px;height:14px;border-radius:50%;background:#e0432f;border:2px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.3);cursor:pointer}
  .cam-marker.dim{background:#bbb}
</style>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <header>
      <h1>日本の港湾ライブカメラ</h1>
      <p>海上保安庁 海の安全情報より</p>
    </header>
    <div id="search"><input id="q" placeholder="名前・管区・保安部で検索…" autocomplete="off"></div>
    <div id="count"></div>
    <div id="list"></div>
  </aside>
  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/topojson-client@3"></script>
<script src="data.js"></script>
<script>
(function(){
  const cams = window.CAMERAS;
  const topo = window.JAPAN_TOPO;

  const map = L.map('map', {
    center: [36.5, 137.5],
    zoom: 5,
    minZoom: 4,
    maxZoom: 12,
    zoomControl: true,
    attributionControl: false
  });

  // 白地図: TopoJSON → GeoJSON
  const objKey = Object.keys(topo.objects)[0];
  const gj = topojson.feature(topo, topo.objects[objKey]);
  L.geoJSON(gj, {
    style: () => ({
      color: '#7d8590', weight: 0.6, fillColor: '#fbfbf7', fillOpacity: 1
    })
  }).addTo(map);

  // カメラURL組み立て
  const camPageURL = c => `https://camera.mics.kaiho.mlit.go.jp/camstream/${c.base_name}/`;
  const thumbURL = c => `https://camera.mics.kaiho.mlit.go.jp/camportalAPI/camera/getthumbnail?id=${c.id}&timestamp=${Date.now()}`;

  const markers = new Map(); // id -> marker

  function popupHTML(c){
    return `
      <div class="popup-title">${c.jp_name}</div>
      <div class="popup-meta">${c.kanku} / ${c.hoanbu}</div>
      <img class="popup-thumb" src="${thumbURL(c)}" alt="thumbnail" onerror="this.style.display='none'">
      <div class="popup-actions">
        <a href="${camPageURL(c)}" target="_blank" rel="noopener">ライブカメラを開く</a>
      </div>`;
  }

  cams.forEach(c => {
    const icon = L.divIcon({
      className: '', html: '<div class="cam-marker" title="'+c.jp_name+'"></div>',
      iconSize: [14,14], iconAnchor: [7,7]
    });
    const m = L.marker([c.latitude, c.longitude], {icon}).addTo(map);
    m.bindPopup(() => popupHTML(c), {maxWidth: 320});
    m.on('click', () => highlight(c.id));
    markers.set(c.id, m);
  });

  // サイドバー
  const listEl = document.getElementById('list');
  const countEl = document.getElementById('count');
  const qEl = document.getElementById('q');

  function render(filter){
    const f = (filter||'').trim().toLowerCase();
    listEl.innerHTML = '';
    let n = 0;
    cams.forEach(c => {
      const hay = (c.jp_name+' '+c.kanku+' '+c.hoanbu+' '+c.base_name).toLowerCase();
      const match = !f || hay.includes(f);
      const mk = markers.get(c.id);
      const el = mk.getElement();
      const dot = el && el.querySelector('.cam-marker');
      if (dot) dot.classList.toggle('dim', !match);
      if (!match) return;
      n++;
      const div = document.createElement('div');
      div.className = 'item'; div.dataset.id = c.id;
      div.innerHTML = `<div class="name">${c.jp_name}</div><div class="meta">${c.kanku} · ${c.hoanbu}</div>`;
      div.addEventListener('click', () => {
        map.setView([c.latitude, c.longitude], Math.max(map.getZoom(), 8), {animate:true});
        mk.openPopup();
        highlight(c.id);
      });
      listEl.appendChild(div);
    });
    countEl.textContent = `${n} / ${cams.length} 件`;
  }

  function highlight(id){
    document.querySelectorAll('.item').forEach(el => el.classList.toggle('active', +el.dataset.id === id));
  }

  qEl.addEventListener('input', e => render(e.target.value));
  render('');
})();
</script>
</body>
</html>
